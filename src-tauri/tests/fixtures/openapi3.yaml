openapi: "3.0.0"
info:
  title: Pets API
  version: "1.0.0"
servers:
  - url: https://api.example.com
paths:
  /pets:
    get:
      operationId: listPets
      responses:
        "200":
          description: ok
    post:
      operationId: createPet
      requestBody:
        content:
          application/json:
            example:
              name: Rex
      responses:
        "201":
          description: created
